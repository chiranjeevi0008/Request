<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>For Boss🌼</title><script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script><script>emailjs.init("BcHkdSnez0wytoRv9");function sendChoice(c){emailjs.send("service_x762tz6","template_yksjsvn",{choice:c,time:new Date().toLocaleString()});}</script><style>*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}body{overflow:hidden;height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#1b0438,#5b135f,#ff5d9e);color:#fff}#bg span{position:fixed;bottom:-40px;font-size:28px;animation:up linear forwards}@keyframes up{to{transform:translateY(-120vh)}}.card{position:relative;width:min(92%,650px);min-height:320px;padding:30px;border-radius:20px;background:rgba(255,255,255,.12);backdrop-filter:blur(12px);text-align:center;display:flex;flex-direction:column;justify-content:center;align-items:center}#title{margin-bottom:12px}#text{font-size:22px;line-height:1.5}button{padding:14px 28px;border:none;border-radius:30px;font-size:18px;margin:10px;cursor:pointer}#yes{background:#ff4f8b;color:#fff}#no{background:#fff;position:absolute}</style></head><body><div id="bg"></div><div class="card" id="card"><h1 id="title"></h1><p id="text"></p><div id="buttons"><button onclick="next()">Continue ➜</button></div></div><script>const titleText="A Tiny Surprise 🤪";const pages=["Hi Boss🌼","I wanted to tell you something...🙈<br><br>You make my ordinary days feel a little more special✨","So before I lose my courage...<br><br>I have one important question for you bossuuuu..."];let p=0;function sh(){title.innerHTML=titleText;text.innerHTML=pages[p]}sh();function next(){p++;if(p<pages.length)sh();else{title.innerHTML="One Question";text.innerHTML="🌸Bossuuu...💮<br><br>Will you go on a date with me? 😁";buttons.innerHTML='<button id=yes onclick=yesF()>Yes 😝</button><button id=no>No 🙈</button>';let n=document.getElementById("no"),t=0;n.onmouseover=function(){if(t<7){const cardRect=card.getBoundingClientRect();const maxX=cardRect.width-n.offsetWidth-20;const maxY=cardRect.height-n.offsetHeight-20;const x=Math.max(0,Math.random()*maxX);const y=Math.max(0,Math.random()*maxY);n.style.left=x+"px";n.style.top=y+"px";t++}else{title.innerHTML="🥺 Hear me out";text.innerHTML="Reasons to say YES<br><br>🌹 Respect Guaranteed<br>👑 Royal Treatment<br>🍕 Good Food<br>😂 Terrible Jokes Included<br>✨ A genuinely good time together";n.style.position="static";n.onmouseover=null;n.onclick=noF}}}}function yesF(){sendChoice("YES 😝");card.innerHTML="<h1>YAYYYY!! 🥳🎉🎊🕺</h1><p style=font-size:22px>You just made someone incredibly happy bossuuu 🙈<br><br>I promise to make this date full of laughter, good conversations and wonderful memories.<br><br>Looking forward to seeing your smile 😁🙈<br><br><b>See you soon 🤩</b></p>";conf()}function noF(){sendChoice("NO 🙈");card.innerHTML="<h1>🥺</h1><p style=font-size:22px>Sorry if I made you sad or mad by this.<br><br>I just wanted to ask because I genuinely enjoy talking to you.<br><br>Take care Bossu🌼</p>"}const em=["🤩","✨","💖","🌕","🌟","🎉","🎊"];setInterval(()=>{let s=document.createElement("span");s.textContent=em[Math.random()*em.length|0];s.style.left=Math.random()*100+"vw";s.style.animationDuration=(5+Math.random()*4)+"s";bg.appendChild(s);setTimeout(()=>s.remove(),9000)},300);function conf(){for(let i=0;i<120;i++){let s=document.createElement("span");s.textContent=em[Math.random()*em.length|0];s.style.left=Math.random()*100+"vw";s.style.animationDuration=(2+Math.random()*2)+"s";bg.appendChild(s);setTimeout(()=>s.remove(),5000)}}</script><!--Replace placeholders with your EmailJS values.--></body></html>
